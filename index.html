<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Zone - Online PDF Tools</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <header class="main-header">
        <div class="logo">PDF<span>Zone</span></div>
        <nav class="navbar">
            <a href="#" onclick="location.reload()">Home</a>
        </nav>
    </header>

    <main class="container">
        <div id="tool-workspace" class="workspace hidden">
            <button class="close-btn" onclick="closeWorkspace()">← Back to All Tools</button>
            <h2 id="active-tool-title" class="tool-title"></h2>
            <div class="workspace-body">
                <div id="dynamic-inputs"></div>
                <div id="param-box" class="hidden"></div>
                <button id="action-btn" class="action-btn" onclick="executeToolActiveLogic()">Process & Download</button>
                <div id="status-message" class="status"></div>
            </div>
        </div>

        <div class="tools-grid" id="tools-section">
            </div>
    </main>

    <footer>
        <p>&copy; 2026 PDF Zone. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

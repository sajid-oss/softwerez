<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Zone | All PDF Tools in One Place</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">PDF<span>Zone</span></div>
        <div class="ad-top-right">Adsterra Slot</div>
    </header>

    <main class="container">
        <div class="side-ad-fixed">
            <div style="height: 600px; background: #ddd; border: 1px dashed #999; display:flex; align-items:center; justify-content:center;">Sidebar Ad</div>
        </div>

        <section id="tools-section" class="tools-grid"></section>

        <div id="tool-workspace" class="hidden">
            <button onclick="closeWorkspace()">← Back</button>
            <h2 id="active-tool-title"></h2>
            <div id="dynamic-inputs"></div>
            <button onclick="executeToolActiveLogic()">Process & Download</button>
            <div id="status-message"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 PDF Zone - Professional PDF Utilities</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
